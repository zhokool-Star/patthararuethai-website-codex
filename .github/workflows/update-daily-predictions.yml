name: Update daily prediction blog

on:
  schedule:
    # 09:00 Asia/Bangkok = 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update daily prediction data
        run: npm run update:daily

      - name: Build site
        run: npm run build

      - name: Commit updated blog data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: update daily prediction blog'
          file_pattern: data/daily-predictions.json
